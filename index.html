<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battleship</title>
  <style>
    :root {
      --ally: #00e0ff;
      --enemy: #ff3366;
    }

    body {
      margin: 0;
      font-family: 'Trebuchet MS', Arial, sans-serif;
      background: linear-gradient(135deg, #011627, #00131a);
      overflow: hidden;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0, 224, 255, 0.2), transparent 70%);
      animation: breathe 8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 0.2; }
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: float 20s linear infinite;
    }
    .orb.enemy {
      background: radial-gradient(var(--enemy), transparent 70%);
    }
    .orb.ally {
      background: radial-gradient(var(--ally), transparent 70%);
    }
    .orb:nth-child(1) { width: 200px; height: 200px; top: 10%; left: 15%; }
    .orb:nth-child(2) { width: 150px; height: 150px; top: 70%; left: 70%; animation-delay: 5s; }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-40px); }
      100% { transform: translateY(0); }
    }

    h1 {
      text-align: center;
      background: linear-gradient(90deg, var(--ally), var(--enemy));
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 10px;
    }
    .game-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 20px 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      z-index: 1;
    }
    .boards {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(10, minmax(24px, 1fr));
      grid-template-rows: repeat(10, minmax(24px, 1fr));
      gap: 2px;
      user-select: none;
    }
    .cell {
      width: 28px;
      height: 28px;
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: background 0.3s, transform 0.3s, box-shadow 0.3s;
    }
    .cell:hover {
      transform: scale(1.1);
      box-shadow: 0 0 6px var(--ally);
    }
    .cell.hit {
      background: rgba(255, 0, 64, 0.7);
      box-shadow: 0 0 10px var(--enemy);
    }
    .cell.miss {
      background: rgba(0, 123, 255, 0.5);
      box-shadow: 0 0 10px var(--ally);
    }
    .cell.ship {
      background: rgba(0, 255, 200, 0.3);
    }
    .explosion {
      animation: explode 0.6s ease-out forwards;
      pointer-events: none;
    }
    @keyframes explode {
      from { transform: scale(0.5); opacity: 1; }
      to { transform: scale(1.8); opacity: 0; }
    }
    .controls {
      margin-bottom: 10px;
    }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(45deg, var(--ally), #0066ff);
      color: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 15px rgba(0,0,0,0.6);
    }
    .status {
      margin-bottom: 10px;
      font-weight: bold;
      background: linear-gradient(90deg, var(--ally), var(--enemy));
      -webkit-background-clip: text;
      color: transparent;
    }
    @media (max-width: 600px) {
      .boards {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="orb ally"></div>
  <div class="orb enemy"></div>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const SHIPS = [
      { name: 'Carrier', size: 5 },
      { name: 'Battleship', size: 4 },
      { name: 'Cruiser', size: 3 },
      { name: 'Submarine', size: 3 },
      { name: 'Destroyer', size: 2 },
    ];

    const createBoard = () => Array(10).fill(0).map(() => Array(10).fill({ ship: null, hit: false, miss: false }));

    function cloneBoard(board) {
      return board.map(row => row.map(cell => ({ ...cell })));
    }

    function placeShip(board, ship, x, y, horizontal) {
      for (let i = 0; i < ship.size; i++) {
        const nx = horizontal ? x + i : x;
        const ny = horizontal ? y : y + i;
        if (nx >= 10 || ny >= 10 || board[ny][nx].ship) return false;
      }
      for (let i = 0; i < ship.size; i++) {
        const nx = horizontal ? x + i : x;
        const ny = horizontal ? y : y + i;
        board[ny][nx].ship = ship.name;
      }
      return true;
    }

    function randomPlacement() {
      const board = createBoard();
      for (let ship of SHIPS) {
        let placed = false;
        while (!placed) {
          const horizontal = Math.random() < 0.5;
          const x = Math.floor(Math.random() * 10);
          const y = Math.floor(Math.random() * 10);
          placed = placeShip(board, ship, x, y, horizontal);
        }
      }
      return board;
    }

    function Game() {
      const [playerBoard, setPlayerBoard] = useState(createBoard());
      const [aiBoard, setAiBoard] = useState(randomPlacement());
      const [placingIndex, setPlacingIndex] = useState(0);
      const [horizontal, setHorizontal] = useState(true);
      const [playerTurn, setPlayerTurn] = useState(false);
      const [aiTargets, setAiTargets] = useState([]);
      const [status, setStatus] = useState('Deploy your fleet');

      useEffect(() => {
        if (placingIndex >= SHIPS.length) {
          setStatus('Awaiting your command');
          setPlayerTurn(true);
        }
      }, [placingIndex]);

      const resetGame = () => {
        setPlayerBoard(createBoard());
        setAiBoard(randomPlacement());
        setPlacingIndex(0);
        setHorizontal(true);
        setPlayerTurn(false);
        setAiTargets([]);
        setStatus('Deploy your fleet');
      };

      const handlePlace = (x, y) => {
        if (placingIndex >= SHIPS.length) return;
        const board = cloneBoard(playerBoard);
        const ship = SHIPS[placingIndex];
        if (placeShip(board, ship, x, y, horizontal)) {
          setPlayerBoard(board);
          setPlacingIndex(placingIndex + 1);
        }
      };

      const handleAttack = (x, y) => {
        if (!playerTurn) return;
        const board = cloneBoard(aiBoard);
        const cell = board[y][x];
        if (cell.hit || cell.miss) return;
        if (cell.ship) {
          cell.hit = true;
        } else {
          cell.miss = true;
        }
        setAiBoard(board);
        setPlayerTurn(false);
        setStatus('Enemy targeting...');
      };

      useEffect(() => {
        if (!playerTurn && placingIndex >= SHIPS.length) {
          const timer = setTimeout(() => aiMove(), 500);
          return () => clearTimeout(timer);
        }
      }, [playerTurn, aiTargets, placingIndex]);

      const aiMove = () => {
        const board = cloneBoard(playerBoard);
        let tx, ty;
        while (true) {
          if (aiTargets.length) {
            const [cx, cy] = aiTargets.pop();
            if (cx >= 0 && cx < 10 && cy >= 0 && cy < 10 && !board[cy][cx].hit && !board[cy][cx].miss) {
              tx = cx; ty = cy; break;
            }
          } else {
            tx = Math.floor(Math.random() * 10);
            ty = Math.floor(Math.random() * 10);
            if (!board[ty][tx].hit && !board[ty][tx].miss) break;
          }
        }
        const cell = board[ty][tx];
        if (cell.ship) {
          cell.hit = true;
          setAiTargets(prev => [...prev, [tx+1, ty], [tx-1, ty], [tx, ty+1], [tx, ty-1]]);
        } else {
          cell.miss = true;
        }
        setPlayerBoard(board);
        setPlayerTurn(true);
        setStatus('Awaiting your command');
      };

      const checkVictory = board => {
        for (let row of board) {
          for (let cell of row) {
            if (cell.ship && !cell.hit) return false;
          }
        }
        return true;
      };

      useEffect(() => {
        if (placingIndex < SHIPS.length) return;
        if (checkVictory(aiBoard)) {
          setStatus('Victory!');
          setPlayerTurn(false);
        } else if (checkVictory(playerBoard)) {
          setStatus('Defeat...');
          setPlayerTurn(false);
        }
      }, [playerBoard, aiBoard, placingIndex]);

      const renderBoard = (board, isPlayer) => {
        return (
          <div className="board">
            {board.map((row, y) =>
              row.map((cell, x) => {
                let className = 'cell';
                if (cell.hit) className += ' hit';
                else if (cell.miss) className += ' miss';
                else if (isPlayer && cell.ship) className += ' ship';
                return (
                  <div
                    key={x + ',' + y}
                    className={className}
                    onClick={() => {
                      if (placingIndex < SHIPS.length && isPlayer) handlePlace(x, y);
                      else if (!isPlayer) handleAttack(x, y);
                    }}
                  >
                    {cell.hit && <span className="explosion">💥</span>}
                    {isPlayer && cell.ship && !cell.hit && '🚢'}
                  </div>
                );
              })
            )}
          </div>
        );
      };

      return (
        <div className="game-container">
          <h1>Battleship</h1>
          <div className="status">{status}</div>
          {placingIndex < SHIPS.length && (
            <div className="controls">
              <button onClick={() => setHorizontal(!horizontal)}>
                Orientation: {horizontal ? 'Horizontal' : 'Vertical'}
              </button>
            </div>
          )}
          <div className="boards">
            {renderBoard(playerBoard, true)}
            {renderBoard(aiBoard, false)}
          </div>
          <button onClick={resetGame}>Reset Game</button>
        </div>
      );
    }

    ReactDOM.render(<Game />, document.getElementById('root'));
  </script>
</body>
</html>

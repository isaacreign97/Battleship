<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battleship Deluxe</title>
  <style>
    :root {
      --ally: #00e0ff;
      --enemy: #ff3366;
      --bg-start: #011627;
      --bg-end: #00131a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Trebuchet MS', Arial, sans-serif;
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,224,255,0.2), transparent 70%);
      animation: breathe 8s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes breathe {
      0%,100% { opacity: 0.6; }
      50% { opacity: 0.2; }
    }
    h1 {
      text-align: center;
      background: linear-gradient(90deg,var(--ally),var(--enemy));
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 10px;
    }
    .container {
      position: relative;
      backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.05);
      padding: 20px 30px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    .boards {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(10, 30px);
      grid-template-rows: repeat(10, 30px);
      gap: 2px;
      user-select: none;
    }
    .cell {
      width: 30px;
      height: 30px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: background 0.3s, transform 0.3s, box-shadow 0.3s;
    }
    .cell:hover { transform: scale(1.1); box-shadow: 0 0 6px var(--ally); }
    .cell.hit { background: rgba(255,0,64,0.7); box-shadow: 0 0 10px var(--enemy); }
    .cell.miss { background: rgba(0,123,255,0.5); box-shadow: 0 0 10px var(--ally); }
    .cell.ship { background: rgba(0,255,200,0.3); }
    .status { font-weight: bold; margin-bottom: 10px; }
    .controls { margin-bottom: 10px; display: flex; gap: 10px; flex-wrap: wrap; }
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: linear-gradient(45deg,var(--ally),#0066ff);
      color: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    button:hover:not(:disabled) { transform: scale(1.1); box-shadow: 0 6px 15px rgba(0,0,0,0.6); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .stats { font-family: monospace; }
    .health-bar { background: rgba(255,255,255,0.1); height: 10px; border-radius: 5px; overflow: hidden; }
    .health { background: var(--ally); height: 100%; transition: width 0.3s; }
    @media(max-width:600px){ .boards{flex-direction:column; align-items:center;} }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
  <script src="multiplayer.js"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const SHIPS = [
      { name: 'Carrier', size: 5 },
      { name: 'Battleship', size: 4 },
      { name: 'Cruiser', size: 3 },
      { name: 'Submarine', size: 3 },
      { name: 'Destroyer', size: 2 }
    ];

    const createBoard = () =>
      Array.from({ length: 10 }, () =>
        Array.from({ length: 10 }, () => ({ ship: null, hit: false, miss: false }))
      );

    function placeShip(board, ship, x, y, horizontal) {
      for (let i = 0; i < ship.size; i++) {
        const nx = horizontal ? x + i : x;
        const ny = horizontal ? y : y + i;
        if (nx >= 10 || ny >= 10 || board[ny][nx].ship) return false;
      }
      for (let i = 0; i < ship.size; i++) {
        const nx = horizontal ? x + i : x;
        const ny = horizontal ? y : y + i;
        board[ny][nx].ship = ship.name;
      }
      return true;
    }

    function randomPlacement() {
      const b = createBoard();
      for (const ship of SHIPS) {
        let placed = false;
        while (!placed) {
          const h = Math.random() < 0.5;
          const x = Math.floor(Math.random() * 10);
          const y = Math.floor(Math.random() * 10);
          placed = placeShip(b, ship, x, y, h);
        }
      }
      return b;
    }

    function Game() {
      const [playerBoard, setPlayerBoard] = useState(createBoard());
      const [aiBoard, setAiBoard] = useState(randomPlacement());
      const [placingIdx, setPlacingIdx] = useState(0);
      const [horizontal, setHorizontal] = useState(true);
      const [playerTurn, setPlayerTurn] = useState(false);
      const [aiTargets, setAiTargets] = useState([]);
      const [status, setStatus] = useState('Deploy your fleet');
      const [playerHits, setPlayerHits] = useState(0);
      const [playerMisses, setPlayerMisses] = useState(0);
      const [aiHits, setAiHits] = useState(0);
      const [result, setResult] = useState(null);

      useEffect(() => {
        if (placingIdx >= SHIPS.length) {
          setStatus('Your turn');
          setPlayerTurn(true);
        }
      }, [placingIdx]);

      function handlePlace(x, y) {
        if (placingIdx >= SHIPS.length) return;
        const board = JSON.parse(JSON.stringify(playerBoard));
        const ship = SHIPS[placingIdx];
        if (placeShip(board, ship, x, y, horizontal)) {
          setPlayerBoard(board);
          setPlacingIdx(placingIdx + 1);
        }
      }

      function handleAttack(x, y) {
        if (!playerTurn || placingIdx < SHIPS.length || result) return;
        const board = JSON.parse(JSON.stringify(aiBoard));
        const cell = board[y][x];
        if (cell.hit || cell.miss) return;
        if (cell.ship) {
          cell.hit = true;
          setPlayerHits(h => h + 1);
        } else {
          cell.miss = true;
          setPlayerMisses(m => m + 1);
        }
        setAiBoard(board);
        setPlayerTurn(false);
        setStatus('Enemy turn');
      }

      useEffect(() => {
        if (!playerTurn && placingIdx >= SHIPS.length && !result) {
          const t = setTimeout(aiMove, 500);
          return () => clearTimeout(t);
        }
      }, [playerTurn, aiTargets, aiBoard, result, placingIdx]);

      function aiMove() {
        const board = JSON.parse(JSON.stringify(playerBoard));
        let tx, ty;
        const rand = () => {
          do {
            tx = Math.floor(Math.random() * 10);
            ty = Math.floor(Math.random() * 10);
          } while (board[ty][tx].hit || board[ty][tx].miss);
        };

        while (aiTargets.length) {
          const [cx, cy] = aiTargets.pop();
          if (cx >= 0 && cx < 10 && cy >= 0 && cy < 10 && !board[cy][cx].hit && !board[cy][cx].miss) {
            tx = cx;
            ty = cy;
            break;
          }
        }
        if (tx === undefined) rand();

        const cell = board[ty][tx];
        if (cell.ship) {
          cell.hit = true;
          setAiHits(h => h + 1);
          setAiTargets(t => [...t, [tx + 1, ty], [tx - 1, ty], [tx, ty + 1], [tx, ty - 1]]);
        } else {
          cell.miss = true;
        }
        setPlayerBoard(board);
        setPlayerTurn(true);
        setStatus('Your turn');
      }

      function checkVictory(b) {
        for (const row of b) {
          for (const cell of row) {
            if (cell.ship && !cell.hit) return false;
          }
        }
        return true;
      }

      useEffect(() => {
        if (placingIdx < SHIPS.length) return;
        if (checkVictory(aiBoard)) {
          setResult('Victory!');
          setStatus('You win!');
        } else if (checkVictory(playerBoard)) {
          setResult('Defeat');
          setStatus('You lose...');
        }
      }, [playerBoard, aiBoard, placingIdx]);

      const totalCells = SHIPS.reduce((a, s) => a + s.size, 0);
      const playerIntegrity = Math.round((1 - aiHits / totalCells) * 100);
      const enemyIntegrity = Math.round((1 - playerHits / totalCells) * 100);

      function renderBoard(board, isPlayer) {
        const cls = 'board' + (isPlayer ? ' player' : ' enemy');
        return (
          <div className={cls}>
            {board.map((row, y) =>
              row.map((cell, x) => {
                let c = 'cell';
                if (cell.hit) c += ' hit';
                else if (cell.miss) c += ' miss';
                else if (isPlayer && cell.ship) c += ' ship';
                return (
                  <div
                    key={x + ',' + y}
                    className={c}
                    onClick={() => {
                      if (placingIdx < SHIPS.length && isPlayer) handlePlace(x, y);
                      else if (!isPlayer) handleAttack(x, y);
                    }}
                  >
                    {(isPlayer && cell.ship && !cell.hit) && '🚢'}
                  </div>
                );
              })
            )}
          </div>
        );
      }

      function reset() {
        setPlayerBoard(createBoard());
        setAiBoard(randomPlacement());
        setPlacingIdx(0);
        setHorizontal(true);
        setPlayerTurn(false);
        setAiTargets([]);
        setStatus('Deploy your fleet');
        setPlayerHits(0);
        setPlayerMisses(0);
        setAiHits(0);
        setResult(null);
      }

      const accuracy = playerHits + playerMisses ? Math.round((playerHits / (playerHits + playerMisses)) * 100) : 0;

      return (
        <div className="container">
          <h1>Battleship</h1>
          <div className="status">{status}</div>
          {placingIdx < SHIPS.length && (
            <div className="controls">
              <button onClick={() => setHorizontal(!horizontal)}>
                Orientation: {horizontal ? 'Horizontal' : 'Vertical'}
              </button>
            </div>
          )}
          <div className="boards">
            {renderBoard(playerBoard, true)}
            {renderBoard(aiBoard, false)}
          </div>
          <div className="stats">
            <div>Hits: {playerHits} | Misses: {playerMisses} | Accuracy: {accuracy}%</div>
            <div style={{ marginTop: '10px' }}>
              <div>Player Fleet Integrity</div>
              <div className="health-bar"><div className="health" style={{width: playerIntegrity + '%'}}></div></div>
              <div>Enemy Fleet Integrity</div>
              <div className="health-bar"><div className="health" style={{width: enemyIntegrity + '%'}}></div></div>
            </div>
          </div>
          <div className="controls" style={{ marginTop: '15px' }}>
            <button onClick={reset}>Reset Game</button>
          </div>
          {result && <h2>{result}</h2>}
        </div>
      );
    }

    ReactDOM.render(<Game />, document.getElementById('root'));
  </script>
</body>
</html>
